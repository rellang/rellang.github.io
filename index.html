<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>World Wide Farm</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js"></script>
  </head>
  <body>
    <header id="status-bar" class="hidden">
      <div>
        <span id="level">Lv.1</span>
      </div>

      <div id="xp-wrapper">
        <div id="xp-bar">
            <div id="xp-fill"></div>
        </div>
        <div id="xp-text">
          <span id="current-xp">50</span> / <span id="max-xp">200</span>
        </div>
      </div>

      <div class="gold">
        <img src="images/gold.png" alt="Gold"/>
        <span id="value">0</span>
      </div>
    </header>

    <div id="start-screen">
      <h1>World Wide Farm</h1>
      <button id="start">GAME START</button>
    </div>

    <div id="main-wrapper">
      <nav id="side-menu" class="hidden">
        <button class="menu-btn shop-btn" title="상점">
            <img src="images/shop.png" alt="상점">
        </button>

        <button class="menu-btn inv-btn" title="인벤토리">
          <img src="images/inventory.png" alt="인벤토리">
        </button>

        <div id="inventory-window" class="hidden">
          <div class="inv-header">
            <button id="close-inv">X</button>
          </div>
          <div id="item-grid"></div>
        </div>
      </nav>

      <div id="game-container">
        <main id="game-map" class="blur"></main>
      </div>
    </div>
  </body>
</html>
